<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 · 直男翻译官</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,700&family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #FAF6F0;
  --cream-deep: #F0E9DC;
  --orange: #FF6B35;
  --orange-deep: #E54B1A;
  --green: #2D4A3E;
  --ink: #1A1A1A;
  --paper: #FFFDF8;
  --muted: #8B7E6E;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--cream);
  font-family: 'Noto Sans SC', sans-serif;
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background-image: 
    radial-gradient(circle at 10% 20%, rgba(255, 107, 53, 0.04) 0%, transparent 40%),
    radial-gradient(circle at 90% 80%, rgba(45, 74, 62, 0.04) 0%, transparent 40%);
}
.card {
  max-width: 380px;
  background: var(--paper);
  border-radius: 28px;
  padding: 36px 28px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
}
.emoji {
  font-size: 80px;
  margin-bottom: 16px;
  filter: drop-shadow(0 4px 12px rgba(255, 107, 53, 0.2));
  animation: float 4s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
.code {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 64px;
  color: var(--orange);
  font-weight: 700;
  line-height: 1;
  margin-bottom: 4px;
}
.title {
  font-family: 'Noto Serif SC', serif;
  font-weight: 900;
  font-size: 22px;
  letter-spacing: 2px;
  margin-bottom: 8px;
}
.title em {
  font-style: normal;
  color: var(--orange);
}
.sub {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.7;
  margin-bottom: 24px;
}
.btn {
  display: inline-block;
  background: var(--ink);
  color: var(--paper);
  padding: 14px 32px;
  border-radius: 100px;
  text-decoration: none;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1px;
  transition: transform 0.2s;
}
.btn:active { transform: scale(0.97); }
.footer {
  margin-top: 24px;
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2px;
}
</style>
</head>
<body>
  <div class="card">
    <div class="emoji">🤷</div>
    <div class="code">404</div>
    <div class="title">这条路<em>他也没听懂</em></div>
    <div class="sub">页面不见了，<br>就像他没听懂你的暗示一样 🌚<br>回测评首页继续吧</div>
    <a href="/zhinan-test/" class="btn">回到测评首页 →</a>
    <div class="footer">STRAIGHT GUY TRANSLATOR</div>
  </div>
</body>
</html>
